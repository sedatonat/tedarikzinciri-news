name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          PUBLIC_CF_BEACON_TOKEN: ${{ secrets.PUBLIC_CF_BEACON_TOKEN }}
          PUBLIC_GISCUS_REPO: ${{ secrets.PUBLIC_GISCUS_REPO }}
          PUBLIC_GISCUS_REPO_ID: ${{ secrets.PUBLIC_GISCUS_REPO_ID }}
          PUBLIC_GISCUS_CATEGORY_ID: ${{ secrets.PUBLIC_GISCUS_CATEGORY_ID }}

      - name: Pagefind search index
        run: npx pagefind --site dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=tedarikzinciri-news --branch=main --commit-dirty=true

      - name: IndexNow ping (Bing/Yandex/Seznam)
        if: success()
        env:
          INDEXNOW_KEY: 38313923ac59a1aa9690cdbf8d4d304c
        run: |
          set -e
          # Collect URLs of news articles changed in this push (TR + EN).
          # Falls back to a small set of high-priority URLs if no diff is available.
          BEFORE='${{ github.event.before }}'
          AFTER='${{ github.sha }}'
          urls=()
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            while IFS= read -r f; do
              case "$f" in
                src/content/news-tr/*.md)
                  slug=$(basename "$f" .md)
                  urls+=("https://tzp.news/haber/$slug/")
                  ;;
                src/content/news-en/*.md)
                  slug=$(basename "$f" .md)
                  urls+=("https://tzp.news/en/news/$slug/")
                  ;;
              esac
            done < <(git diff --name-only --diff-filter=AM "$BEFORE" "$AFTER" 2>/dev/null || true)
          fi
          # Always include the home pages so the crawl pipeline stays warm.
          urls+=("https://tzp.news/")
          urls+=("https://tzp.news/en/")
          # De-duplicate
          mapfile -t urls < <(printf '%s\n' "${urls[@]}" | awk 'NF && !seen[$0]++')
          # Cap to 10000 (IndexNow per-request limit) — almost certainly fine.
          if [ ${#urls[@]} -eq 0 ]; then
            echo "No URLs to ping; skipping IndexNow."
            exit 0
          fi
          echo "Pinging ${#urls[@]} URL(s) to IndexNow..."
          # Build JSON body
          urls_json=$(printf '%s\n' "${urls[@]}" | jq -R . | jq -s .)
          body=$(jq -n --arg host "tzp.news" --arg key "$INDEXNOW_KEY" \
            --arg loc "https://tzp.news/$INDEXNOW_KEY.txt" \
            --argjson urls "$urls_json" \
            '{host: $host, key: $key, keyLocation: $loc, urlList: $urls}')
          echo "$body" | head -c 500; echo
          curl -sS -X POST -H 'Content-Type: application/json' -d "$body" \
            'https://api.indexnow.org/IndexNow' -o /tmp/indexnow.out -w 'HTTP %{http_code}\n' || true
          cat /tmp/indexnow.out 2>/dev/null || true
